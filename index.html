<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz Ball</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 480px;
            width: 90%;
            padding: 20px;
        }

        .img-box {
            width: 100%;
            margin-bottom: 30px;
            overflow: hidden;
            border-radius: 20px;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            /* Zachování ostrosti */
            image-rendering: auto;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
            color: #eeeeee;
        }

        .btn {
            display: inline-block;
            background-color: #d881fa;
            color: #000000;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 20px 45px;
            border-radius: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(216, 129, 250, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="img-box">
        <img src="https://i.ibb.co/9HWHdKNH/1000027160.png" alt="Buzz Ball Kvalitní">
    </div>

    <p>Když někdo donatene, tak se ten buzz ball bude plnit.</p>

    <a href="https://paypal.me/Davisoppxx" class="btn">
        PŘISPĚT PŘES PAYPAL
    </a>
</div>

</body>
</html>
