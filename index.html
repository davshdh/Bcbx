<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz Ball</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 450px;
            width: 90%;
            padding: 20px;
        }

        img {
            width: 100%;
            max-width: 400px; /* Aby nebyla obří a rozmazaná */
            height: auto;
            display: block;
            margin: 0 auto 30px auto;
            image-rendering: -webkit-optimize-contrast; /* Trochu pomůže ostrosti v prohlížeči */
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 400;
        }

        .btn {
            display: inline-block;
            background-color: #d881fa;
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #e2a4fb;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/9HWHdKNH/1000027160.png" alt="Buzz Ball">

    <p>Když někdo donatene, tak se ten buzz ball bude plnit.</p>

    <a href="https://paypal.me/Davisoppxx" class="btn">
        PŘISPĚT PŘES PAYPAL
    </a>
</div>

</body>
</html>
