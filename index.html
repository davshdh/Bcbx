<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill the Buzz Ball - Ultimate Design</title>
    <style>
        :root {
            --bg-deep: #05050a;
            --accent-pink: #ff0080;
            --accent-purple: #7928ca;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-deep);
            background: radial-gradient(circle at center, #1e1e3f 0%, #05050a 100%);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 95%;
            max-width: 420px;
            background: linear-gradient(145deg, #16162d, #0b0b18);
            border-radius: 45px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            text-align: center;
            padding-bottom: 40px;
        }

        .image-section {
            padding: 40px 20px 10px;
        }

        .image-section img {
            width: 80%;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(255, 0, 128, 0.3);
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            margin: 0 0 25px;
            letter-spacing: -1px;
        }

        .progress-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 0 30px 30px;
        }

        /* POŘÁDNĚ VIDITELNÝ BAR */
        .bar-container {
            width: 100%;
            height: 35px; /* Tlustší bar */
            background: #000;
            border-radius: 50px;
            padding: 5px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,1);
        }

        .bar-fill {
            /* TADY NASTAVUJEŠ % - i při 0% bude teď vidět záře na začátku */
            width: 0%; 
            min-width: 20px; 
            height: 100%;
            background: linear-gradient(90deg, #ff0080, #7928ca);
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.8);
            position: relative;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: var(--accent-pink);
            text-transform: uppercase;
            font-weight: 800;
        }

        /* ZVÝRAZNĚNÝ TEXT */
        .desc {
            color: #ffffff;
            font-size: 16px;
            line-height: 1.5;
            margin: 0 35px 35px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }

        .btn-action {
            display: block;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 20px;
            padding: 20px;
            margin: 0 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s ease;
        }

        .btn-action:hover {
            transform: scale(1.03);
            background: var(--accent-pink);
            color: #fff;
        }
    </style>
</head>
<body>
