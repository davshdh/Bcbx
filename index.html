<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostGenius AI | Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-bold text-blue-600">PostGenius.ai</div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 px-6 text-center">
        <h1 class="text-4xl font-extrabold mb-4">LinkedIn Post Generator</h1>
        <p class="text-slate-600 mb-8">Write your idea below and let AI do the magic.</p>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 text-left">
            <label class="block text-sm font-semibold text-slate-500 uppercase mb-2">Your Story / Idea</label>
            <textarea id="userInput"
                class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg resize-none"
                placeholder="Ex: I just finished my first web project..."></textarea>
            
            <button onclick="generatePost()" id="genBtn" class="mt-6 w-full bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg flex justify-center items-center">
                <span id="btnText">Generate Post ✨</span>
                <div id="loader" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6 hidden"></div>
            </button>
        </div>

        <div id="resultBox" class="mt-10 hidden bg-white p-8 rounded-3xl shadow-md border-l-4 border-blue-500 text-left">
            <h3 class="font-bold text-blue-600 mb-2">Your AI Generated Post:</h3>
            <p id="resultText" class="text-slate-800 whitespace-pre-wrap leading-relaxed"></p>
            <button onclick="copyText()" class="mt-4 text-sm font-semibold text-slate-500 hover:text-blue-600 underline">Copy to clipboard</button>
        </div>
    </main>

    <script>
        async function generatePost() {
            // !!! SEM VLOŽ SVŮJ KLÍČ !!!
            const apiKey = ''; 
            
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('genBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if (!input) {
                alert("Please write something first!");
                return;
            }

            // Animace načítání
            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [
                            { role: "system", content: "You are a world-class LinkedIn ghostwriter. Write an engaging, professional post with emojis and hashtags based on the user's input. Language: English." },
                            { role: "user", content: input }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    alert("Error: " + data.error.message);
                } else {
                    resultText.innerText = data.choices[0].message.content;
                    resultBox.classList.remove('hidden');
                }
            } catch (error) {
                alert("Something went wrong. Check your API key or internet.");
            } finally {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyText() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
