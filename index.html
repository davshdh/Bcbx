<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralStory AI | Creator Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .magic-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="p-6">
    <main class="max-w-xl mx-auto mt-10">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black mb-2 italic tracking-tighter">VIRAL STORY AI</h1>
            <p class="text-slate-400 font-medium">Generuj scénáře pro TikTok a Reels za 0 Kč</p>
        </div>

        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-3">O čem má příběh být?</label>
            <input id="topic" type="text" placeholder="Např. strašidelný les, zrada v rodině..." 
                class="w-full p-4 bg-slate-900 border border-slate-700 rounded-2xl mb-4 outline-none focus:border-purple-500 transition-all">
            
            <label class="block text-xs font-bold text-slate-500 uppercase mb-3">Délka příběhu</label>
            <select id="length" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-2xl mb-6 outline-none">
                <option value="krátký (30 sekund)">Krátký (Shorts/TikTok)</option>
                <option value="dlouhý (2 minuty)">Dlouhý (YouTube)</option>
            </select>

            <button onclick="generateStory()" id="btn" class="w-full magic-bg py-4 rounded-2xl font-black uppercase tracking-widest hover:opacity-90 transition-all active:scale-95">
                Vytvořit virální scénář ✨
            </button>
        </div>

        <div id="resultBox" class="hidden mt-8 space-y-4">
            <div class="p-6 bg-slate-900 rounded-3xl border border-purple-500/30">
                <h3 class="text-purple-400 font-bold mb-4 uppercase text-sm tracking-widest">Tvůj scénář:</h3>
                <div id="resultText" class="text-slate-300 leading-relaxed whitespace-pre-wrap italic"></div>
            </div>
        </div>
    </main>

    <script>
        async function generateStory() {
            const apiKey = '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'; // Vlož svůj GSK klíč
            const topic = document.getElementById('topic').value;
            const length = document.getElementById('length').value;
            const btn = document.getElementById('btn');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if (!topic) return alert("Napiš aspoň jedno slovo, o čem to má být!");

            btn.innerText = "PÍŠU PŘÍBĚH...";
            btn.disabled = true;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { 
                                role: "system", 
                                content: `Jsi špičkový scénárista pro TikTok a YouTube. Piš napínavé, šokující a emočně silné příběhy v češtině. Rozděl příběh na 'SCÉNA 1, SCÉNA 2...' a ke každé scéně přidej krátký popis, co by mělo být vidět na pozadí.` 
                            },
                            { role: "user", content: `Téma: ${topic}, délka: ${length}` }
                        ]
                    })
                });

                const data = await response.json();
                resultText.innerText = data.choices[0].message.content;
                resultBox.classList.remove('hidden');
            } catch (e) {
                alert("Chyba: Zkontroluj svůj Groq klíč!");
            } finally {
                btn.innerText = "Vytvořit virální scénář ✨";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
