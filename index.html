<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #0b0b15;
            --accent-pink: #ff0080;
            --accent-purple: #7928ca;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
            --bar-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #1a1a2e 0%, #0b0b15 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: rgba(20, 20, 35, 0.9);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            padding-bottom: 20px;
        }

        .image-container {
            width: 100%;
            padding-top: 40px;
            margin-bottom: 10px;
        }

        .image-container img {
            width: 85%;
            height: auto;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.5));
        }

        .content {
            padding: 20px 30px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 24px 0;
            letter-spacing: -1px;
        }

        /* ČISTÝ PROGRESS BAR PODLE VZORU */
        .progress-container {
            margin-bottom: 30px;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--bar-bg);
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%; /* Tady měníš procenta */
            height: 100%;
            background: rgba(255, 255, 255, 0.15); /* Jemná šedá/bílá podle vzoru */
            border-radius: 10px;
            transition: width 1s ease;
        }

        .progress-details {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .detail-item {
            text-align: left;
        }

        .detail-item.right {
            text-align: right;
        }

        .amount {
            display: block;
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
        }

        .label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        p {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin: 25px 0;
            text-align: center;
        }

        .btn-paypal {
            display: block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            padding: 16px;
            border-radius: 14px;
            transition: transform 0.2s ease;
            margin-bottom: 15px;
        }

        .btn-paypal:hover {
            transform: scale(1.02);
        }

        .footer-text {
            font-size: 10px;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball Status">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Buzz Ball.</h1>
        
        <div class="progress-container">
            <div class="progress-track">
                <div class="progress-fill" style="width: 0%;"></div>
            </div>
            <div class="progress-details">
                <div class="detail-item">
                    <span class="amount">0€</span>
                    <span class="label">raised</span>
                </div>
                <div class="detail-item right">
                    <span class="amount">5€</span>
                    <span class="label">goal (0%)</span>
                </div>
            </div>
        </div>

        <p>
            Let's be real. Help me fill this <strong>Buzz Ball</strong> to the top. 
            Every donation updates the progress and brings us closer to the goal.
        </p>

        <a href="https://paypal.me/Davisoppxx" class="btn-paypal">
            Support the Goal
        </a>

        <div class="footer-text">
            Direct via PayPal • 100% Transparency
        </div>
    </div>
</div>

</body>
</html>
