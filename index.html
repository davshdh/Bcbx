<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judy Hopps | 10 Year Initiative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 10% 20%, #1e1b4b 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, #4c1d95 0%, transparent 40%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .glass-card {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }

        .img-box {
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 28px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-badge {
            background: rgba(236, 72, 153, 0.15);
            color: #f472b6;
            font-size: 10px;
            font-weight: 800;
            padding: 7px 14px;
            border-radius: 100px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            letter-spacing: 0.1em;
            border: 1px solid rgba(236, 72, 153, 0.3);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #f472b6;
            border-radius: 50%;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7); }
            70% { transform: scale(1.4); opacity: 0.3; box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); opacity: 1; }
        }

        .progress-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bar-bg {
            background: #111;
            height: 10px;
            border-radius: 10px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            background: linear-gradient(90deg, #ec4899, #8b5cf6);
            height: 100%;
            width: 8%; /* Progress value */
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }

        .btn-main {
            background: #ffffff;
            color: #000000;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
            text-decoration: none;
            margin-bottom: 16px;
        }

        .btn-main:hover {
            transform: scale(1.02);
            background: #f8f8f8;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.1);
        }

        .description {
            color: #94a3b8;
            font-size: 0.875rem;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="img-box">
            <img src="https://i.ibb.co/VcC1N0Wh/40674c56bc017d74956d596b57fb6e96.jpg" alt="Judy Hopps" class="w-full h-full object-cover">
        </div>

        <div class="status-badge">
            <span class="pulse-dot"></span>
            Goal in Progress
        </div>

        <h1 class="text-3xl font-extrabold mb-6 tracking-tight">
            Judy Hopps for 10 years
        </h1>

        <div class="progress-box text-left">
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <div class="text-2xl font-black tracking-tighter">0€</div>
                    <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Raised</div>
                </div>
                <div class="text-right">
                    <div class="text-2xl font-black tracking-tighter text-pink-500">25€</div>
                    <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Goal</div>
                </div>
            </div>
        </div>

        <p class="description">
            I'm raising money to make my dream come true — to have Judy Hopps live with me as my companion for the next 10 years, <span class="text-gray-300 font-semibold italic">I swear I have a job.</span>
        </p>

        <a href="https://paypal.me/Davisoppxx" target="_blank" class="btn-main">
            Support the Goal
        </a>

        <p class="text-[9px] text-gray-600 font-bold tracking-[0.25em] uppercase">
            Direct via PayPal — No hidden fees
        </p>
    </div>

</body>
</html>
