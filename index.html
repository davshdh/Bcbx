<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PUPPETEER | AI Brand Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .bg-matrix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #000 80%);
            z-index: -1;
        }
        .neon-border { border: 1px solid rgba(99, 102, 241, 0.4); box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .glitch-text { font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.3em; }
        .input-dark { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; color: #fff; padding: 1.5rem; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        .btn-fire { background: linear-gradient(90deg, #6366f1, #a855f7); font-weight: 900; transition: 0.4s; }
        .btn-fire:hover { transform: scale(1.02); filter: brightness(1.2); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="bg-matrix"></div>

    <div class="max-w-5xl mx-auto">
        <header class="mb-16 flex justify-between items-end">
            <div>
                <h2 class="glitch-text text-indigo-500 text-xs mb-2 italic">Operation: Digital Empire</h2>
                <h1 class="text-6xl font-black tracking-tighter">PUPPETEER <span class="text-indigo-600">v1.0</span></h1>
            </div>
            <div class="text-right hidden md:block">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Model Status</p>
                <p class="text-green-500 font-mono text-sm">LLAMA-3.3-70B-ONLINE</p>
            </div>
        </header>

        <main class="grid lg:grid-cols-1 gap-8">
            <div class="bg-white/5 p-8 md:p-12 rounded-[2.5rem] neon-border backdrop-blur-xl">
                <div class="space-y-8">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Tvůj záměr / Cíl (např. Prodávat e-book o krypto podvodech)</label>
                        <textarea id="mainGoal" class="w-full h-40 input-dark resize-none text-xl font-light" placeholder="Co chceš dneska ovládnout?"></textarea>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Strategický režim</label>
                            <select id="mode" class="w-full input-dark cursor-pointer font-bold appearance-none">
                                <option value="Kontroverzní Viral Hooky">KONTROVERZNÍ HOOKY</option>
                                <option value="Psychologický prodejní scénář">PRODEJNÍ PSYCHOLOGIE</option>
                                <option value="Hater-Farming (Vyvolání hádky)">VYVOLÁNÍ KONFLIKTU</option>
                                <option value="Stavba mýtu o brandu">STAVBA MÝTU</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Platforma</label>
                            <select id="platform" class="w-full input-dark cursor-pointer font-bold appearance-none">
                                <option value="TikTok / Reels">TIKTOK / REELS</option>
                                <option value="YouTube Shorts">YOUTUBE SHORTS</option>
                                <option value="X (Twitter) Thread">X (TWITTER)</option>
                            </select>
                        </div>
                    </div>

                    <button onclick="executeInference()" id="execBtn" class="btn-fire w-full py-6 rounded-2xl text-xl tracking-widest uppercase">
                        SPUSTIT MANIPULACI
                    </button>
                </div>

                <div id="resultBox" class="hidden mt-12 animate-pulse">
                    <div class="h-px bg-gradient-to-r from-transparent via-indigo-500 to-transparent mb-12"></div>
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-xs font-black text-indigo-400 uppercase tracking-widest">Generovaný výstup</span>
                        <button onclick="copyOut()" class="text-xs hover:text-indigo-400 transition">KOPIE</button>
                    </div>
                    <div id="output" class="text-slate-200 leading-relaxed text-2xl font-light italic whitespace-pre-wrap"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function executeInference() {
            const apiKey = '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'; // ZDE VLOŽ KLÍČ
            const goal = document.getElementById('mainGoal').value;
            const mode = document.getElementById('mode').value;
            const platform = document.getElementById('platform').value;
            const btn = document.getElementById('execBtn');
            const resultBox = document.getElementById('resultBox');
            const output = document.getElementById('output');

            if (!goal) return alert("Zadej cíl operace.");

            btn.innerText = "PROPOJUJI NEURONY...";
            btn.disabled = true;

            const sysPrompt = `Jsi elitní stratég pro digitální manipulaci a branding. Tvůj úkol: ${mode} pro platformu ${platform}. 
            Cíl uživatele: ${goal}. Piš v ČEŠTINĚ. Buď agresivní, provokativní a psychologicky přesný. 
            Nepoužívej klišé. Používej silná slova a strukturu, která nutí k akci.`;

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: sysPrompt }, { role: "user", content: goal }],
                        temperature: 0.9
                    })
                });
                const data = await res.json();
                output.innerText = data.choices[0].message.content;
                resultBox.classList.remove('hidden');
                resultBox.classList.remove('animate-pulse');
            } catch (e) {
                alert("Systémová chyba: " + e.message);
            } finally {
                btn.innerText = "SPUSTIT MANIPULACI";
                btn.disabled = false;
            }
        }

        function copyOut() {
            navigator.clipboard.writeText(document.getElementById('output').innerText);
            alert("Uloženo do paměti.");
        }
    </script>
</body>
</html>
