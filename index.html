<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #05050a;
            --card-bg: #0f0f1b;
            --accent-pink: #ff0080;
            --accent-blue: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #88889b;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at 50% -20%, #1e1e3f 0%, #05050a 100%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 95%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 0, 128, 0.1);
            overflow: hidden;
            position: relative;
        }

        .image-section {
            padding: 40px 20px 20px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.03), transparent);
            text-align: center;
        }

        .image-section img {
            width: 85%;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.7));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .content {
            padding: 20px 35px 40px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), #7928ca);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.4);
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            margin: 0 0 30px;
            letter-spacing: -1.5px;
            line-height: 1;
        }

        /* TLUSTÝ A PROPRACCOVANÝ PROGRESS BAR */
        .progress-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .bar-container {
            width: 100%;
            height: 28px; /* Pořádně tlustý bar */
            background: #1a1a2e;
            border-radius: 50px;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            position: relative;
        }

        .bar-fill {
            width: 0%; /* ZMĚNIT PRO PROGRESS */
            height: 100%;
            background: linear-gradient(90deg, var(--accent-pink), #ff4d94);
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.6), inset 0 0 8px rgba(255,255,255,0.4);
            transition: width 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            position: relative;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
        }

        .stat-group {
            text-align: left;
        }

        .stat-group.right {
            text-align: right;
        }

        .stat-value {
            display: block;
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            display: block;
        }

        .desc {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-action {
            display: block;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 19px;
            padding: 22px;
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-action:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 0, 128, 0.2);
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #44445a;
            letter-spacing: 1px;
        }
    </style>
</head>
