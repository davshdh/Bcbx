<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #0b0b15;
            --accent-purple: #d881fa;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
            --bar-color: #00d2ff;
            --bar-glow: rgba(0, 210, 255, 0.4);
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #1a1a2e 0%, #0b0b15 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 95%;
            max-width: 420px;
            background: rgba(15, 15, 25, 0.95);
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9);
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .image-container {
            width: 100%;
            padding: 40px 0 20px 0;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
        }

        .image-container img {
            width: 80%; /* ZVĚTŠENÝ OBRÁZEK */
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.6));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        .content {
            padding: 20px 30px 40px 30px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, #ff0080, #7928ca);
            color: white;
            font-size: 10px;
            font-weight: 900;
            padding: 6px 14px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(216, 129, 250, 0.3);
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            margin: 0 0 25px 0;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* PROPRACCOVANÝ PROGRESS BAR */
        .progress-container {
            margin: 30px 0;
            position: relative;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .status-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .percentage {
            font-size: 22px;
            font-weight: 900;
            color: var(--bar-color);
            text-shadow: 0 0 10px var(--bar-glow);
        }

        .bar-outer {
            width: 100%;
            height: 24px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 4px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .bar-inner {
            width: 0%; /* ZAČÁTEK NA 0% */
            height: 100%;
            border-radius: 8px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            position: relative;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            box-shadow: 0 0 20px var(--bar-glow);
        }

        /* Animovaný odlesk uvnitř baru */
        .bar-inner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 100%
            );
            animation: moveShine 2s infinite;
        }

        @keyframes moveShine {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        .goal-tag {
            display: inline-block;
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .goal-tag strong {
            color: #fff;
            font-size: 18px;
            margin-left: 5px;
        }

        .btn-paypal {
            display: block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            padding: 20px;
            border-radius: 24px;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn-paypal:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.4);
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Buzz Ball.</h1>
        
        <div class="progress-container">
            <div class="progress-stats">
                <span class="status-label">Current Progress</span>
                <span class="percentage">0%</span>
            </div>
            <div class="bar-outer">
                <div class="bar-inner" style="width: 0%;"></div>
            </div>
            <div class="goal-tag">Target: <strong>5.00 €</strong></div>
        </div>

        <a href="https://paypal.me/Davisoppxx" class="btn-paypal">
            Support the Goal
        </a>

        <div class="footer">
            Direct via PayPal • 100% Transparency
        </div>
    </div>
</div>

</body>
</html>
