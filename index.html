<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz Ball Donation</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 90%;
            width: 400px;
            padding: 20px;
        }

        .image-container {
            width: 100%;
            margin-bottom: 30px;
        }

        img {
            width: 100%;
            height: auto;
            border-radius: 15px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            background-color: #d881fa;
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 18px 40px;
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-container">
        <img src="https://i.ibb.co/9HWHdKNH/1000027160.png" alt="Buzz Ball">
    </div>

    <p>Když někdo donatene, tak se ten buzz ball bude plnit.</p>

    <a href="https://paypal.me/Davisoppxx" class="btn">
        PŘISPĚT PŘES PAYPAL
    </a>
</div>

</body>
</html>
