<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewResponder AI | Business Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .gradient-text { background: linear-gradient(90deg, #4f46e5, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="max-w-5xl mx-auto py-8 px-6 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter text-slate-900">Review<span class="text-indigo-600">AI</span></div>
        <div class="flex items-center gap-2">
            <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">System Online</span>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-6">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-slate-900 mb-4 leading-tight">Vydělávej na <br><span class="gradient-text">spokojených klientech</span></h1>
            <p class="text-slate-500 text-lg">Profesionální odpovědi na Google a Facebook recenze během sekundy.</p>
        </div>

        <div class="bg-white rounded-[2rem] shadow-2xl shadow-indigo-100 border border-slate-100 p-8 md:p-10">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Recenze zákazníka</label>
                    <textarea id="reviewInput" 
                        class="w-full h-40 p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 focus:ring-0 outline-none text-slate-700 transition-all resize-none text-lg"
                        placeholder="Zkopíruj sem text recenze..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Styl odpovědi</label>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="tone" class="col-span-2 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 font-semibold text-slate-700">
                            <option value="profesionální, omluvný a vstřícný">👔 Profesionální / Omluvný</option>
                            <option value="velmi vděčný, přátelský a nadšený">🌟 Přátelský / Vděčný</option>
                            <option value="vtipný, sarkastický ale slušný">⚡ Vtipný / Odlehčený</option>
                        </select>
                    </div>
                </div>

                <button onclick="generateReply()" id="genBtn" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-xl hover:bg-indigo-600 transition-all shadow-xl active:scale-95 flex justify-center items-center gap-3">
                    <span>Vygenerovat odpověď</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="resultBox" class="hidden mt-10 transform transition-all">
            <div class="bg-indigo-600 rounded-[2rem] p-8 text-white shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-indigo-200 font-bold uppercase text-xs tracking-widest">AI Výsledek</span>
                    <button onclick="copyText()" class="bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-xl text-xs font-bold transition-colors">KOPÍROVAT</button>
                </div>
                <p id="resultText" class="text-lg leading-relaxed font-medium italic"></p>
            </div>
        </div>
    </main>

    <script>
        async function generateReply() {
            // --- SEM VLOŽ SVŮJ GROQ API KLÍČ ---
            const apiKey = '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';
            // ----------------------------------

            const review = document.getElementById('reviewInput').value;
            const tone = document.getElementById('tone').value;
            const btn = document.getElementById('genBtn');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if (!review) {
                alert("Nejdřív vlož text recenze!");
                return;
            }

            btn.innerText = "AI přemýšlí...";
            btn.disabled = true;
            btn.style.opacity = "0.7";

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { 
                                role: "system", 
                                content: `Jsi profesionální manažer komunikace. Tvým úkolem je napsat odpověď na recenzi zákazníka v českém jazyce. Tón odpovědi musí být ${tone}. Odpověď musí být stručná, slušná a cílená na budování dobrého jména firmy.` 
                            },
                            { role: "user", content: review }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    alert("Chyba API: " + data.error.message);
                } else {
                    resultText.innerText = data.choices[0].message.content;
                    resultBox.classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            } catch (error) {
                alert("Něco se nepovedlo. Zkontroluj internet a API klíč.");
            } finally {
                btn.innerText = "Vygenerovat odpověď";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }

        function copyText() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            alert("Zkopírováno do schránky!");
        }
    </script>
</body>
</html>
