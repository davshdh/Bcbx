<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryViral AI | Ultimate Creator Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--dark); color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #fb7185 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); transition: all 0.4s; box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5); }
        .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.7); }
        .glow-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: radial-gradient(circle at 15% 25%, rgba(99, 102, 241, 0.12) 0%, transparent 35%), radial-gradient(circle at 85% 75%, rgba(168, 85, 247, 0.12) 0%, transparent 35%); }
    </style>
</head>
<body>
    <div class="glow-mesh"></div>
    <nav class="max-w-7xl mx-auto px-6 py-10 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <span class="text-3xl font-black text-white font-['Space_Grotesk'] uppercase tracking-tighter">StoryViral<span class="text-indigo-400">.io</span></span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-20 items-center pt-10 pb-32">
        <div class="space-y-10">
            <h1 class="text-7xl xl:text-8xl font-extrabold leading-[1] tracking-tight">Viral <span class="gradient-text">Stories</span> Without Limits.</h1>
            <p class="text-slate-400 text-xl leading-relaxed max-w-lg">Optimized for high-retention AI scriptwriting. Ready for Llama 3.3.</p>
        </div>

        <div class="glass-card p-10 shadow-2xl">
            <div class="space-y-8">
                <textarea id="storyInput" class="w-full h-44 p-7 bg-black/40 border-2 border-slate-800 rounded-[2rem] focus:border-indigo-500 outline-none text-white text-lg transition-all" placeholder="Describe the story core..."></textarea>
                <div class="grid grid-cols-2 gap-6">
                    <select id="tone" class="w-full p-5 bg-black/40 border-2 border-slate-800 rounded-2xl text-slate-300 font-bold outline-none appearance-none"><option value="dark horror">Dark Horror</option><option value="reddit style">Reddit Story</option></select>
                    <select id="length" class="w-full p-5 bg-black/40 border-2 border-slate-800 rounded-2xl text-slate-300 font-bold outline-none appearance-none"><option value="TikTok/Shorts">TikTok/Shorts</option><option value="YouTube">YouTube</option></select>
                </div>
                <button onclick="generateStory()" id="genBtn" class="btn-primary w-full text-white py-6 rounded-[1.5rem] font-black text-xl uppercase tracking-widest flex justify-center items-center gap-4">
                    <span id="btnText">Launch AI Generation</span>
                    <div id="loader" class="hidden animate-spin h-6 w-6 border-4 border-white/20 border-t-white rounded-full"></div>
                </button>
            </div>
            <div id="resultContainer" class="hidden mt-12 pt-10 border-t border-slate-800/50">
                <div id="resultText" class="text-slate-300 leading-[1.8] font-medium italic text-lg whitespace-pre-wrap"></div>
            </div>
        </div>
    </main>

    <script>
        async function generateStory() {
            // !!! SEM VLOŽ SVŮJ KLÍČ !!!
            const apiKey = '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'; 

            const prompt = document.getElementById('storyInput').value;
            const btn = document.getElementById('genBtn');
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');

            if (!prompt) return alert("Write something!");

            btn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile", // TADY JE TA OPRAVA
                        messages: [{ role: "system", content: "Write a viral script in English." }, { role: "user", content: prompt }]
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                resultText.innerText = data.choices[0].message.content;
                resultContainer.classList.remove('hidden');
            } catch (err) {
                alert("API Error: " + err.message);
            } finally {
                btn.disabled = false;
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
