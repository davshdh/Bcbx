<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill the Buzz Ball - Ultimate Design</title>
    <style>
        :root {
            --bg-deep: #05050a;
            --accent-pink: #ff0080;
            --accent-purple: #7928ca;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-deep);
            background: radial-gradient(circle at center, #1e1e3f 0%, #05050a 100%);
            color: var(--text-white);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card {
            width: 95%;
            max-width: 420px;
            background: linear-gradient(145deg, #16162d, #0b0b18);
            border-radius: 45px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(255, 0, 128, 0.15);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .image-section {
            padding: 45px 20px 15px;
            text-align: center;
        }

        .image-section img {
            width: 85%;
            filter: drop-shadow(0 25px 45px rgba(0, 0, 0, 0.8));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .content {
            padding: 10px 35px 45px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(255, 0, 128, 0.4);
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            margin: 0 0 30px;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff 60%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .bar-container {
            width: 100%;
            height: 32px;
            background: #000;
            border-radius: 50px;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
        }

        .bar-fill {
            /* Změň na 0% pokud začínáš od nuly */
            width: 0%; 
            height: 100%;
            background: linear-gradient(90deg, #ff0080, #ff80bf, #7928ca);
            background-size: 200% 100%;
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.7);
            position: relative;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-value {
            display: block;
            font-size: 26px;
            font-weight: 900;
            color: #fff;
        }

        .stat-label {
            font-size: 13px;
            color: var(--accent-pink);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 4px;
            display: block;
        }
