<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judy Hopps | 10 Year Initiative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #4c1d95 0%, transparent 40%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .glass-card {
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .img-box {
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 28px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            background: rgba(236, 72, 153, 0.1);
            color: #f472b6;
            font-size: 11px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 100px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
            border: 1px solid rgba(236, 72, 153, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #f472b6;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .progress-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .bar-bg {
            background: #111;
            height: 10px;
            border-radius: 10px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            background: linear-gradient(90deg, #ec4899, #8b5cf6);
            height: 100%;
            width: 12%; /* Progress status */
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
        }

        .btn-main {
            background: white;
            color: black;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
            text-decoration: none;
            margin-bottom: 16px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
            background: #f0f0f0;
        }

        .btn-main:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="img-box">
            <img src="https://i.ibb.co/hJd6MxRn/image.jpg" alt="Judy Hopps" class="w-full h-full object-cover" onerror="this.src='https://i.ibb.co/jk379z1Z/image.jpg'">
        </div>

        <div class="status-badge">
            <span class="pulse-dot"></span>
            Live Funding
        </div>

        <h1 class="text-3xl font-extrabold mb-6 tracking-tight leading-tight">
            Judy Hopps for 10 years
        </h1>

        <div class="progress-box text-left">
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <div class="text-2xl font-black tracking-tighter">0€</div>
                    <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Amount Raised</div>
                </div>
                <div class="text-right">
                    <div class="text-2xl font-black tracking-tighter text-pink-500">25€</div>
                    <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Target Goal</div>
                </div>
            </div>
        </div>

        <p class="text-gray-400 text-sm font-medium leading-relaxed mb-8 px-2">
            I'm raising money to make my dream come true — to have Judy Hopps live with me as my companion for the next 10 years, <span class="text-gray-200 italic">I swear I have a job.</span>
        </p>

        <a href="https://paypal.me/Davisoppxx" target="_blank" class="btn-main">
            Support the Goal
        </a>

        <p class="text-[9px] text-gray-600 font-bold tracking-[0.2em] uppercase">
            Direct via PayPal — Secure Transaction
        </p>
    </div>

</body>
</html>
