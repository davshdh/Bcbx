<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #05050a;
            --card-bg: #0f0f1b;
            --accent-pink: #ff0080;
            --accent-blue: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #88889b;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at 50% -20%, #1e1e3f 0%, #05050a 100%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 95%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 0, 128, 0.1);
            overflow: hidden;
        }

        .image-section {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .image-section img {
            width: 85%;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.7));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .content {
            padding: 20px 35px 40px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), #7928ca);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.4);
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            margin: 0 0 30px;
            letter-spacing: -1.5px;
        }

        /* EXTRA TLUSTÝ PROGRESS BOX */
        .progress-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 30px 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .bar-container {
            width: 100%;
            height: 35px; /* Extra tloušťka */
            background: #000000;
            border-radius: 50px;
            padding: 5px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 15px rgba(0,0,0,1);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .bar-fill {
            /* TADY NASTAVUJEŠ PROCENTA - teď je tam 10% aby to bylo hned vidět */
            width: 10%; 
            height: 100%;
            background: linear-gradient(90deg, var(--accent-pink), #ff4d94);
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.8), inset 0 0 10px rgba(255,255,255,0.4);
            transition: width 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            position: relative;
        }

        /* Animovaný odlesk pro "tekutý" vzhled */
        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255,255,255,0.2) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
        }

        .stat-group {
            text-align: left;
        }

        .stat-group.right {
            text-align: right;
        }

        .stat-value {
            display: block;
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            display: block;
        }

        .desc {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-action {
            display: block;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 20px;
            padding: 22px;
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-action:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 0, 128, 0.3);
            background: #f8f8f8;
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #44445a;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-section">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Buzz Ball.</h1>
        
        <div class="progress-box">
            <div class="bar-container">
                <div class="bar-fill" style="width: 10%;"></div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-group">
                    <span class="stat-value">0€</span>
                    <span class="stat-label">Raised</span>
                </div>
                <div class="stat-group right">
                    <span class="stat-value">5€</span>
                    <span class="stat-label">Goal (0%)</span>
                </div>
            </div>
        </div>

        <p class="desc">
            Let's be real. Help me fill this <strong>Buzz Ball</strong> to the top. Every contribution counts.
        </p>

        <a href="https://paypal.me/Davisoppxx" class="btn-action">
            Support the Goal
        </a>

        <div class="footer">
            DIRECT VIA PAYPAL • 100% TRANSPARENCY
        </div>
    </div>
</div>

</body>
</html>
