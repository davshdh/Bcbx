<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill the Buzz Ball</title>
    <style>
        :root {
            --bg-color: #05050a;
            --pink: #ff0080;
            --purple: #7928ca;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at center, #1e1e3f 0%, #05050a 100%);
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: #111122;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .image-container img {
            width: 80%;
            margin-bottom: 20px;
        }

        .badge {
            background: linear-gradient(90deg, var(--pink), var(--purple));
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 { margin: 0 0 20px; font-size: 32px; }

        .progress-box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 25px;
        }

        .bar-bg {
            width: 100%;
            height: 30px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 1px solid #333;
        }

        .bar-fill {
            width: 0%; /* Zde měníš procenta */
            min-width: 20px; /* Pojistka proti zmizení */
            height: 100%;
            background: linear-gradient(90deg, var(--pink), var(--purple));
            box-shadow: 0 0 15px var(--pink);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .label {
            color: var(--pink);
            font-size: 11px;
            display: block;
            text-transform: uppercase;
        }

        .desc {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn {
            display: block;
            background: white;
            color: black;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball">
    </div>

    <div class="badge">LIQUID EVOLUTION</div>
    <h1>Fill the Buzz Ball.</h1>

    <div class="progress-box">
        <div class="bar-bg">
            <div class="bar-fill"></div>
        </div>
        <div class="stats">
            <div style="text-align: left;">
                <span>0€</span>
                <span class="label">RAISED</span>
            </div>
            <div style="text-align: right;">
                <span>5€</span>
                <span class="label">GOAL (0%)</span>
            </div>
        </div>
    </div>

    <p class="desc">LET'S BE REAL. HELP ME FILL THIS BUZZ BALL TO THE TOP. EVERY DONATION UPDATES THE PROGRESS!</p>

    <a href="https://paypal.me/Davisoppxx" class="btn">Support the Goal</a>
</div>
