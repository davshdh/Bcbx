<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill the Buzz Ball - Ultimate Design</title>
    <style>
        :root {
            --bg-deep: #05050a;
            --accent-pink: #ff0080;
            --accent-purple: #7928ca;
            --accent-blue: #00d2ff;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-deep);
            background: radial-gradient(circle at center, #1e1e3f 0%, #05050a 100%);
            color: var(--text-white);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card {
            width: 95%;
            max-width: 420px;
            background: linear-gradient(145deg, #16162d, #0b0b18);
            border-radius: 45px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(255, 0, 128, 0.15);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--accent-pink);
            filter: blur(80px);
            opacity: 0.2;
            z-index: -1;
        }

        .image-section {
            padding: 45px 20px 15px;
            text-align: center;
        }

        .image-section img {
            width: 85%;
            filter: drop-shadow(0 25px 45px rgba(0, 0, 0, 0.8));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .content {
            padding: 10px 35px 45px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(255, 0, 128, 0.4);
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            margin: 0 0 30px;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff 60%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
