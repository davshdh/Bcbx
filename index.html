<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judy Hopps for 10 Years</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .main-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
            padding: 40px 20px;
        }
        .judy-img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .btn-paypal {
            background-color: #0070ba;
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: transform 0.2s;
            text-decoration: none;
            margin-top: 20px;
            width: 100%;
        }
        .btn-paypal:hover {
            transform: scale(1.02);
            background-color: #005ea6;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="https://i.ibb.co/jk379z1Z/image.jpg" alt="Judy Hopps" class="judy-img">

        <h1 class="text-4xl font-black mb-4 tracking-tight text-black">
            Judy Hopps for 10 years
        </h1>

        <p class="text-gray-600 text-lg leading-relaxed mb-8">
            I'm raising money to make my dream come true — to have Judy Hopps live with me as my companion for the next 10 years, I swear I have a job.
        </p>

        <div class="bg-gray-100 rounded-full h-4 mb-2 overflow-hidden">
            <div class="bg-blue-500 h-full w-1/3"></div>
        </div>
        <div class="flex justify-between text-sm font-bold mb-8">
            <span>€0 raised</span>
            <span>Goal: €25</span>
        </div>

        <a href="https://paypal.me/Davisoppxx" target="_blank" class="btn-paypal">
            Donate €25 via PayPal
        </a>

        <p class="text-[10px] text-gray-400 mt-10 uppercase tracking-widest">
            Satirical Fundraiser • No bunnies included
        </p>
    </div>

</body>
</html>
