<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostGenius AI | Professional LinkedIn Posts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-bold text-blue-600 tracking-tight">PostGenius.ai</div>
        <div class="space-x-4">
            <a href="#" class="text-slate-600 hover:text-blue-600 transition">Pricing</a>
            <button class="bg-blue-600 text-white px-5 py-2 rounded-full font-semibold hover:bg-blue-700 transition shadow-lg">Get Started</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-20 px-6 text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold mb-6 leading-tight">
            Turn your raw thoughts into <span class="text-blue-600">Viral Posts</span>
        </h1>
        <p class="text-xl text-slate-600 mb-10 max-w-2xl mx-auto">
            The #1 AI writing assistant for founders and professionals. Grow your audience on LinkedIn in seconds.
        </p>

        <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 text-left">
            <label class="block text-sm font-semibold text-slate-500 uppercase tracking-wider mb-2">What happened today?</label>
            <textarea 
                class="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg resize-none"
                placeholder="Ex: I just closed a $10k deal after 6 months of negotiations. I learned that persistence is key..."></textarea>
            
            <div class="mt-6 flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="flex gap-2">
                    <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-md text-sm font-medium italic">Style: Professional</span>
                </div>
                <button class="w-full md:w-auto bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-black transition-all transform hover:scale-105 shadow-xl">
                    Generate Post ✨
                </button>
            </div>
        </div>

        <div class="mt-12 text-slate-400 text-sm italic">
            Trusted by 500+ creators worldwide
        </div>
    </main>

    <footer class="mt-32 py-10 border-t border-slate-200 text-center text-slate-500">
        <p>&copy; 2024 PostGenius AI. All rights reserved.</p>
    </footer>

</body>
</html>
