<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill the Buzz Ball - Ultimate Design</title>
    <style>
        :root {
            --bg-deep: #05050a;
            --accent-pink: #ff0080;
            --accent-purple: #7928ca;
            --accent-blue: #00d2ff;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-deep);
            background: radial-gradient(circle at center, #1e1e3f 0%, #05050a 100%);
            color: var(--text-white);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card {
            width: 95%;
            max-width: 420px;
            background: linear-gradient(145deg, #16162d, #0b0b18);
            border-radius: 45px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(255, 0, 128, 0.15);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--accent-pink);
            filter: blur(80px);
            opacity: 0.2;
            z-index: -1;
        }

        .image-section {
            padding: 45px 20px 15px;
            text-align: center;
        }

        .image-section img {
            width: 85%;
            filter: drop-shadow(0 25px 45px rgba(0, 0, 0, 0.8));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .content {
            padding: 10px 35px 45px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(255, 0, 128, 0.4);
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            margin: 0 0 30px;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #fff 60%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        .bar-container {
            width: 100%;
            height: 32px;
            background: #000;
            border-radius: 50px;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
        }

        .bar-fill {
            width: 100%; /* NASTAVENO NA 100% */
            height: 100%;
            background: linear-gradient(90deg, #ff0080, #ff80bf, #7928ca);
            background-size: 200% 100%;
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.7);
            position: relative;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .bar-fill::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px 50px 0 0;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-value {
            display: block;
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .stat-label {
            font-size: 13px;
            color: var(--accent-pink);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 4px;
            display: block;
        }

        .desc {
            color: #ffffff;
            font-size: 17px;
            line-height: 1.6;
            margin: 0 0 35px 0;
            font-weight: 800;
            text-shadow: 0 2px 15px rgba(0,0,0,1), 0 0 5px rgba(255,255,255,0.2);
            padding: 0 10px;
        }

        .btn-action {
            display: block;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 22px;
            padding: 20px;
            border-radius: 22px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-action:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 50px rgba(255, 0, 128, 0.4);
            background: var(--accent-pink);
            color: #fff;
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #555570;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-section">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball Evolution">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Buzz Ball.</h1>
        
        <div class="progress-box">
            <div class="bar-container">
                <div class="bar-fill" style="width: 100%;"></div>
            </div>
            
            <div class="stats-grid">
                <div style="text-align: left;">
                    <span class="stat-value">5€</span>
                    <span class="stat-label">Raised</span>
                </div>
                <div style="text-align: right;">
                    <span class="stat-value">5€</span>
                    <span class="stat-label">Goal (100%)</span>
                </div>
            </div>
        </div>

        <p class="desc">
            LET'S BE REAL. HELP ME FILL THIS BUZZ BALL TO THE TOP. EVERY DONATION UPDATES THE PROGRESS AND BRINGS US CLOSER TO THE GOAL!
        </p>

        <a href="https://paypal.me/Davisoppxx" class="btn-action">
            Support the Goal
        </a>

        <div class="footer">
            DIRECT VIA PAYPAL • 100% TRANSPARENCY
        </div>
    </div>
</div>

</body>
</html>
