<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #0b0b15;
            --accent-purple: #d881fa;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
            --bar-color: #00d2ff;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #1a1a2e 0%, #0b0b15 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: rgba(15, 15, 25, 0.9);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .image-container {
            width: 100%;
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.02);
        }

        .image-container img {
            width: 60%;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .content {
            padding: 32px 24px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, #ff0080, #7928ca);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 16px 0;
            letter-spacing: -1px;
        }

        /* PROGRESS BAR STYLY */
        .progress-box {
            margin: 25px 0;
            text-align: left;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .progress-bg {
            width: 100%;
            height: 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-fill {
            width: 20%; /* TADY UPRAV PROCENTA NAPLNĚNÍ */
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .goal-info {
            display: block;
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
            color: var(--text-dim);
        }

        .goal-info strong {
            color: white;
        }

        p {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-paypal {
            display: block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            padding: 18px;
            border-radius: 16px;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }

        .btn-paypal:hover {
            transform: scale(1.03);
            background: #f8f8f8;
        }

        .footer-text {
            font-size: 12px;
            color: #4b5563;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball Status">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Buzz Ball.</h1>
        
        <div class="progress-box">
            <div class="progress-header">
                <span>Progress</span>
                <span>20%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill" style="width: 20%;"></div>
            </div>
            <span class="goal-info">Goal: <strong>5.00 €</strong></span>
        </div>

        <p>
            Every donation updates the progress and brings us closer to the goal.
        </p>

        <a href="https://paypal.me/Davisoppxx" class="btn-paypal">
            Support the Goal
        </a>

        <div class="footer-text">
            Direct via PayPal • 100% Transparency
        </div>
    </div>
</div>

</body>
</html>
