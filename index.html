<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz Ball Progress</title>
    <style>
        :root {
            --accent: #d881fa;
            --bg: #000000;
            --card: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            text-align: center;
        }

        /* Glassmorphism efekt pro fotku */
        .image-card {
            background: var(--card);
            border: 1px solid #1a1a1a;
            border-radius: 30px;
            padding: 10px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 22px;
            image-rendering: -webkit-optimize-contrast;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .description {
            font-size: 16px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .description strong {
            color: var(--accent);
        }

        .btn {
            display: block;
            background-color: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            padding: 20px;
            border-radius: 20px;
            transition: all 0.2s cubic-bezier(0.2, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(216, 129, 250, 0.15);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 15px 40px rgba(216, 129, 250, 0.25);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-card">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball Status">
    </div>

    <h1>Buzz Ball</h1>
    <p class="description">
        Every donation helps fill the <strong>Buzz Ball</strong>. 
        Watch it grow in real-time as we hit our goals!
    </p>

    <a href="https://paypal.me/Davisoppxx" class="btn">
        SUPPORT VIA PAYPAL
    </a>

    <div class="footer-note">Direct via PayPal • Secure Connection</div>
</div>

</body>
</html>
