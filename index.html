<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #05050a;
            --card-bg: #0f0f1b;
            --accent-pink: #ff0080;
            --text-main: #ffffff;
            --text-dim: #88889b;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at 50% -20%, #1e1e3f 0%, #05050a 100%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 92%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            text-align: center;
        }

        .image-section {
            padding: 35px 20px 10px;
        }

        .image-section img {
            width: 80%;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.7));
        }

        .content {
            padding: 20px 30px 40px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), #7928ca);
            padding: 7px 18px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 34px;
            font-weight: 900;
            margin: 0 0 25px;
            letter-spacing: -1px;
        }

        /* KOMPAKTNÍ ALE TLUSTÝ PROGRESS BOX */
        .progress-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
        }

        .bar-container {
            width: 100%;
            height: 24px;
            background: #000;
            border-radius: 50px;
            padding: 4px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
            overflow: hidden;
        }

        .bar-fill {
            width: 0%; /* Zde nastavuješ aktuální progress */
            height: 100%;
            background: linear-gradient(90deg, var(--accent-pink), #ff4d94);
            border-radius: 50px;
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.6);
            position: relative;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
        }

        .stat-value {
            display: block;
            font-size: 22px;
            font-weight: 900;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 4px;
            display: block;
        }

        /* TEXT POD TÍM - ZVÝRAZNĚNÝ A BÍLÝ */
        .desc {
            color: #ffffff;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 700; /* Extra zvýraznění */
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-action {
            display: block;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            font-weight: 800;
            font-size: 19px;
            padding: 18px;
            border-radius: 18px;
            transition: transform 0.2s ease;
        }

        .btn-action:hover {
            transform: scale(1.02);
        }

        .footer {
            margin-top: 25px;
            font-size: 10px;
            color: #44445a;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-section">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Buzz Ball.</h1>
        
        <div class="progress-box">
            <div class="bar-container">
                <div class="bar-fill" style="width: 0%;"></div>
            </div>
            
            <div class="stats-grid">
                <div style="text-align: left;">
                    <span class="stat-value">0€</span>
                    <span class="stat-label">Raised</span>
                </div>
                <div style="text-align: right;">
                    <span class="stat-value">5€</span>
                    <span class="stat-label">Goal (0%)</span>
                </div>
            </div>
        </div>

        <p class="desc">
            Let's be real. Help me fill this Buzz Ball to the top. Every donation updates the progress and brings us closer to the goal.
        </p>

        <a href="https://paypal.me/Davisoppxx" class="btn-action">
            Support the Goal
        </a>

        <div class="footer">
            DIRECT VIA PAYPAL • 100% TRANSPARENCY
        </div>
    </div>
</div>

</body>
</html>
