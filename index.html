<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #0b0b15;
            --accent-purple: #d881fa;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
            --bar-color: #00d2ff;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #1a1a2e 0%, #0b0b15 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: rgba(15, 15, 25, 0.9);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            backdrop-filter: blur(15px);
        }

        .image-container {
            width: 100%;
            padding: 30px 0;
            background: rgba(255, 255, 255, 0.02);
        }

        .image-container img {
            width: 55%;
            height: auto;
            filter: drop-shadow(0 15px 30px rgba(0, 210, 255, 0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .content {
            padding: 32px 24px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, #ff0080, #7928ca);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        /* VYLEPŠENÝ PROGRESS BAR */
        .progress-box {
            margin: 30px 0;
            text-align: left;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
        }

        .progress-bg {
            width: 100%;
            height: 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .progress-fill {
            width: 0%; /* ZAČÍNÁME NA 0% */
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% 100%;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            border-radius: 20px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .goal-info {
            display: block;
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
            color: var(--text-dim);
        }

        .goal-info strong {
            color: #00d2ff;
            font-size: 16px;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn-paypal {
            display: block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            padding: 18px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-paypal:hover {
            transform: translateY(-3px) scale(1.02);
            background: #ffffff;
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.3);
        }

        .footer-text {
            font-size: 11px;
            color: #4b5563;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball Status">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Ball.</h1>
        
        <div class="progress-box">
            <div class="progress-header">
                <span>Current Status</span>
                <span>0%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill" style="width: 0%;"></div>
            </div>
            <span class="goal-info">Target Goal: <strong>5.00 €</strong></span>
        </div>

        <p>
            Join the evolution. Every contribution fills the meter and brings the project to life.
        </p>

        <a href="https://paypal.me/Davisoppxx" class="btn-paypal">
            Support the Goal
        </a>

        <div class="footer-text">
            SECURE VIA PAYPAL • 100% TRANSPARENT
        </div>
    </div>
</div>

</body>
</html>
