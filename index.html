<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #0b0b15;
            --accent-purple: #d881fa;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #1a1a2e 0%, #0b0b15 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(15, 15, 25, 0.8);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .image-container {
            width: 100%;
            line-height: 0;
        }

        .image-container img {
            width: 100%;
            height: auto;
            /* Bez editace, čistě jak jsi poslal */
        }

        .content {
            padding: 32px 24px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, #ff0080, #7928ca);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 16px 0;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        p {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        p strong {
            color: white;
        }

        /* Tlačítko přesně podle vzoru */
        .btn-paypal {
            display: block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            padding: 18px;
            border-radius: 16px;
            transition: transform 0.2s ease, opacity 0.2s ease;
            margin-bottom: 12px;
        }

        .btn-paypal:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .footer-text {
            font-size: 12px;
            color: #4b5563;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball Status">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Buzz Ball.</h1>
        
        <p>
            Let's be real. Help me fill this <strong>Buzz Ball</strong> to the top. 
            Every donation updates the progress and brings us closer to the goal.
        </p>

        <a href="https://paypal.me/Davisoppxx" class="btn-paypal">
            Support the Goal
        </a>

        <div class="footer-text">
            Direct via PayPal • 100% Transparency
        </div>
    </div>
</div>

</body>
</html>
