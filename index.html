<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judy Hopps Fund</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            background-image: radial-gradient(circle at top right, #1a0b2e 0%, #000000 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: #0a0a12;
            border: 1px solid #1f1f2e;
            border-radius: 40px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .img-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .tag {
            background: linear-gradient(90deg, #9d174d 0%, #701a75 100%);
            color: #ff99cc;
            font-size: 10px;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 20px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .progress-container {
            background-color: #050508;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .progress-bar {
            background: #111;
            height: 12px;
            border-radius: 10px;
            position: relative;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #ec4899, #be185d);
            height: 100%;
            width: 5%; /* Startovni progres */
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }
        .dot {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #ec4899;
            border-radius: 50%;
            box-shadow: 0 0 10px #ec4899;
        }
        .btn-support {
            background-color: #ffffff;
            color: #000000;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.2s;
            display: block;
            text-decoration: none;
            margin-bottom: 15px;
        }
        .btn-support:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="img-container">
            <img src="https://i.ibb.co/jk379z1Z/image.jpg" alt="Judy" class="w-full h-auto object-cover">
        </div>

        <div class="tag">Next Decade Goal</div>

        <h1 class="text-3xl font-black mb-8 leading-tight">
            Judy Hopps for 10 years
        </h1>

        <div class="progress-container text-left">
            <div class="progress-bar">
                <div class="progress-fill"></div>
                <div class="dot"></div>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <div class="text-2xl font-black">0€</div>
                    <div class="text-[10px] font-bold text-pink-600 uppercase">Raised</div>
                </div>
                <div class="text-right">
                    <div class="text-2xl font-black">25€</div>
                    <div class="text-[10px] font-bold text-pink-600 uppercase">Goal</div>
                </div>
            </div>
        </div>

        <p class="text-gray-400 text-sm font-bold leading-relaxed mb-8 uppercase tracking-wide px-4">
            I'm raising money to make my dream come true — to have Judy Hopps live with me as my companion for the next 10 years, I swear I have a job
        </p>

        <a href="https://paypal.me/Davisoppxx" target="_blank" class="btn-support">
            Support the Goal
        </a>

        <p class="text-[9px] text-gray-600 font-bold tracking-[0.2em] uppercase">
            Direct via PayPal — 100% Transparency
        </p>
    </div>

</body>
</html>
