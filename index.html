<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz Ball</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 20px;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 30px auto;
            border-radius: 10px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #eeeeee;
        }

        .btn {
            display: inline-block;
            background-color: #d881fa;
            color: #000000;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 18px 45px;
            border-radius: 15px;
            transition: transform 0.2s, filter 0.2s;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball">

    <p>Když někdo donatene, tak se ten buzz ball bude plnit.</p>

    <a href="https://paypal.me/Davisoppxx" class="btn">
        PŘISPĚT PŘES PAYPAL
    </a>
</div>

</body>
</html>
