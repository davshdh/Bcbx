<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Buzz Ball Project</title>
    <style>
        :root {
            --bg-color: #0b0b15;
            --accent-pink: #ff0080;
            --accent-purple: #7928ca;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #1a1a2e 0%, #0b0b15 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: rgba(15, 15, 25, 0.9);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .image-container {
            width: 100%;
            padding-top: 30px;
        }

        .image-container img {
            width: 85%; /* Zvětšený obrázek */
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
        }

        .content {
            padding: 32px 24px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 16px 0;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        /* STYLOVÝ PROGRESS BAR PODLE VZORU */
        .donation-box {
            margin: 30px 0;
            padding: 0 10px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            margin-bottom: 15px;
        }

        .progress-fill {
            width: 0%; /* Změň na % podle potřeby */
            height: 100%;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            border-radius: 10px;
            position: relative;
        }

        /* Ten malý puntík na konci lišty */
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .donation-labels {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
        }

        .raised { color: #ffffff; }
        .goal { color: var(--accent-pink); }

        p {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        p strong { color: white; }

        .btn-paypal {
            display: block;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            padding: 18px;
            border-radius: 16px;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .btn-paypal:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .footer-text {
            font-size: 11px;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="image-container">
        <img src="https://i.ibb.co/d4D4HCr4/a-But-I-need-it-to-be.png" alt="Buzz Ball Status">
    </div>

    <div class="content">
        <div class="badge">Liquid Evolution</div>
        
        <h1>Fill the Buzz Ball.</h1>
        
        <div class="donation-box">
            <div class="progress-track">
                <div class="progress-fill" style="width: 0%;"></div>
            </div>
            <div class="donation-labels">
                <span class="raised">0€ raised</span>
                <span class="goal">Goal: 5€</span>
            </div>
        </div>

        <p>
            Let's be real. Help me fill this <strong>Buzz Ball</strong> to the top. 
            Every donation updates the progress and brings us closer to the goal.
        </p>

        <a href="https://paypal.me/Davisoppxx" class="btn-paypal">
            Support the Goal
        </a>

        <div class="footer-text">
            Direct via PayPal • 100% Transparency
        </div>
    </div>
</div>

</body>
</html>
