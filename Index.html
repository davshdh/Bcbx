<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #51C6FB;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Horní lišta se statusy - úplně nahoře */
        .top-status-bar {
            background-color: #C1E9F9;
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            border-bottom: 2px solid #333;
        }

        .top-status-bar img {
            height: 30px;
        }

        /* Navigační lišta s názvem místnosti a ikonami */
        .room-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            height: 50px;
        }

        .room-nav img {
            height: 45px;
        }

        /* Judy - uprostřed, ale hodně velká */
        .character-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .character-container img {
            height: 110%; /* Zvětšení postavy aby byla dominantní */
            object-fit: contain;
        }

        /* Spodní lišta nástrojů */
        .tools-bar {
            height: 100px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 5px;
            position: relative;
        }

        .tool-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }

        .tool-box img {
            height: 60px; /* Menší ikony podle vzoru */
        }

        .tool-label {
            margin-top: 2px;
        }

    </style>
</head>
<body>

    <div class="top-status-bar">
        <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" alt="Coiny">
        <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" alt="Statusy">
        <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" alt="Level">
    </div>

    <div class="room-nav">
        <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" alt="Navigace Koupelna" style="width: 100%; object-fit: contain;">
    </div>

    <div class="character-container">
        <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" alt="Judy Hoops">
    </div>

    <div class="tools-bar">
        <div class="tool-box">
            <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
            <div class="tool-label">Sprcha</div>
        </div>

        <div class="tool-box">
            <div style="height: 60px;"></div>
            <div class="tool-label">Mýdlo</div>
        </div>

        <div class="tool-box">
            <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
            <div class="tool-label">Obchod</div>
        </div>
    </div>

</body>
</html>
