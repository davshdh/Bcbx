<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pou Koupelna - Final</title>
    <style>
        body {
            margin: 0;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .game-screen {
            width: 360px;
            height: 640px;
            background-color: #21cbf3; /* Stěna koupelny */
            position: relative;
            border: 2px solid #000;
        }

        /* LIŠTA 1: Statistiky a Levely */
        .status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 55px;
            background-color: #8bedfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
            z-index: 5;
        }

        /* LIŠTA 2: Navigace (Koupelna) */
        .nav-bar {
            position: absolute;
            top: 55px;
            width: 100%;
            height: 50px;
            background-color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 5;
        }

        /* POSTAVA: Judy (Uši musí jít PŘES lišty) */
        .character {
            position: absolute;
            top: 80px; /* Posunuto výš, aby uši překryly menu */
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            z-index: 10; /* Vyšší číslo zajistí, že je Judy nahoře */
        }

        /* PODLAHA: Spodní menu */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background-color: #17a2c9;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 15;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            color: black;
            font-size: 14px;
            text-shadow: 1px 1px white;
        }

        .item img { height: 60px; }

        /* Pomocné třídy pro ikonky v lištách */
        .img-coin { height: 45px; }
        .img-stats { height: 35px; border: 1px solid black; }
        .img-level { height: 50px; }
        .img-room { height: 35px; }

    </style>
</head>
<body>

    <div class="game-screen">
        
        <div class="status-bar">
            <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" class="img-coin">
            <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="img-stats">
            <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" class="img-level">
        </div>

        <div class="nav-bar">
            <span style="font-size: 20px; border: 1px solid black; padding: 2px 5px;">📷</span>
            <span style="font-size: 20px; border: 1px solid black; padding: 2px 5px;">&lt;</span>
            <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" class="img-room">
            <span style="font-size: 20px; border: 1px solid black; padding: 2px 5px;">&gt;</span>
            <span style="font-size: 20px; border: 1px solid black; padding: 2px 5px;">?</span>
        </div>

        <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" class="character">

        <div class="floor">
            <div class="item">
                <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png">
                <span>Sprcha</span>
            </div>
            <div class="item">
                <img src="https://i.ibb.co/0X65XN7/soap.png" style="width: 60px; height: 40px; background: #4da6ff; border-radius: 10px; border: 2px solid #0059b3;">
                <span>Mýdlo</span>
            </div>
            <div class="item">
                <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png">
                <span>Obchod</span>
            </div>
        </div>

    </div>

</body>
</html>
