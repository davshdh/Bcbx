<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Pou Koupelna - Judy Hoops</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0; /* Světlé pozadí jako v koupelně */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Horní lišta se statistikami */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            background: rgba(255,255,255,0.5);
        }

        .stat-icon { height: 40px; }
        .coin-icon { height: 35px; }
        .level-icon { height: 45px; }

        /* Indikátor místnosti (Koupelna) */
        .room-indicator {
            margin-top: 10px;
            height: 50px;
        }

        /* Hlavní herní plocha */
        .game-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        .character {
            width: 200px; /* Judy Hoops */
            z-index: 2;
        }

        /* Spodní lišta s předměty */
        .bottom-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 20px;
        }

        .item {
            width: 80px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .item:hover {
            transform: scale(1.1);
        }

        .shop-btn {
            width: 70px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <img src="https://i.ibb.co/3mq1t2RW/20260515-194952963.png" alt="Level" class="level-icon">
        <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" alt="Stats" class="stat-icon">
        <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" alt="Coins" class="coin-icon">
    </div>

    <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" alt="Koupelna" class="room-indicator">

    <div class="game-area">
        <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" alt="Judy Hoops" class="character">
    </div>

    <div class="bottom-bar">
        <img src="https://i.ibb.co/5gp47LNG/20260515-192907388.png" alt="Mýdlo" class="item">
        
        <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod" class="shop-btn">

        <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha" class="item">
    </div>

</body>
</html>
