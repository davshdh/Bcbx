<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        /* Odstraníme okraje a zajistíme, aby se stránka nehýbala */
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #1a1a1a; font-family: sans-serif;
        }

        /* Hlavní kontejner hry ve velikosti mobilu */
        .game-window {
            width: 360px; height: 640px;
            background-color: #21cbf3; /* Světle modrá zeď */
            margin: 20px auto;
            position: relative;
            border: 5px solid black;
            display: flex; flex-direction: column;
        }

        /* 1. HORNÍ LIŠTA (Coiny, Bary, Levely) */
        .header-stats {
            background-color: #8bedfe;
            height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px;
        }

        /* 2. BAR S NÁZVEM (Koupelna) */
        .room-bar {
            background-color: white;
            height: 50px;
            display: flex; justify-content: center; align-items: center;
            border-top: 2px solid #000; border-bottom: 2px solid #000;
        }

        /* 3. PROSTOR PRO JUDY (Přesně uprostřed) */
        .main-game-area {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
        }
        .judy-character {
            width: 280px; /* Velikost Judy */
            height: auto;
        }

        /* 4. SPODNÍ LIŠTA (Sprcha, Mýdlo, Obchod) */
        .footer-nav {
            background-color: #17a2c9; /* Tmavší modrá podlaha */
            height: 120px;
            display: flex; justify-content: space-around; align-items: center;
        }

        .btn-box {
            display: flex; flex-direction: column; align-items: center;
        }
        .btn-box img { height: 70px; margin-bottom: 5px; }
        .btn-box span { font-weight: bold; font-size: 14px; text-shadow: 1px 1px 0px white; }

        /* Pomocné třídy pro velikost obrázků v menu */
        .img-top { height: 45px; }
        .img-room { height: 40px; }
    </style>
</head>
<body>

    <div class="game-window">
        
        <div class="header-stats">
            <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" class="img-top"> <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="img-top"> <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" class="img-top"> </div>

        <div class="room-bar">
            <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" class="img-room"> </div>

        <div class="main-game-area">
            <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" class="judy-character">
        </div>

        <div class="footer-nav">
            <div class="btn-box">
                <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png"> <span>Sprcha</span>
            </div>
            
            <div class="btn-box">
                <div style="width: 70px; height: 45px; background: #3498db; border: 3px solid white; border-radius: 10px;"></div>
                <span>Mýdlo</span>
            </div>

            <div class="btn-box">
                <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png"> <span>Obchod</span>
            </div>
        </div>

    </div>

</body>
</html>
