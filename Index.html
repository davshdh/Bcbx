<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Pou Koupelna - Judy</title>
    <style>
        /* Základní nastavení stránky */
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* Hlavní mobilní okno hry */
        .game-screen {
            width: 360px;
            height: 640px;
            background-color: #21cbf3; /* Modré pozadí koupelny */
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 4px solid #000;
        }

        /* Horní lišta (Coiny, Bary, Level) */
        .top-status-bar {
            height: 65px;
            background-color: #8bedfe;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            z-index: 10;
        }
        .top-status-bar img { height: 50px; }
        .stats-center { height: 40px !important; }

        /* Lišta místnosti (Koupelna) */
        .room-indicator {
            height: 50px;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            z-index: 10;
        }
        .room-indicator img { height: 35px; }

        /* Hlavní herní plocha s Judy */
        .character-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .judy-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* Spodní lišta (Sprcha, Mýdlo, Obchod) */
        .bottom-nav {
            height: 110px;
            background-color: #17a2c9; /* Podlaha */
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #000;
        }
        .nav-item img { height: 70px; }
        .nav-item span { font-weight: bold; font-size: 14px; margin-top: 2px; }

        /* Mýdlo (Placeholder dokud nebude obrázek) */
        .soap-placeholder {
            width: 70px;
            height: 45px;
            background: #4da6ff;
            border: 3px solid #fff;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="game-screen">
        
        <div class="top-status-bar">
            <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" alt="Coiny">
            
            <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="stats-center" alt="Bary">
            
            <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" alt="Levels">
        </div>

        <div class="room-indicator">
            <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" alt="Koupelna Bar">
        </div>

        <div class="character-area">
            <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" class="judy-img" alt="Judy Hopps">
        </div>

        <div class="bottom-nav">
            <div class="nav-item">
                <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
                <span>Sprcha</span>
            </div>

            <div class="nav-item">
                <div class="soap-placeholder"></div>
                <span>Mýdlo</span>
            </div>

            <div class="nav-item">
                <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
                <span>Obchod</span>
            </div>
        </div>

    </div>

</body>
</html>
