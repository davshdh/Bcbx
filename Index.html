<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #51C6FB;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Horní sekce - Statusy, Coiny, Level */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
        }

        .status-bar {
            background-color: #C0E8F9; /* Světlejší modrá lišta */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 5px;
            height: 45px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        /* Navigace pod statusy (Koupelna) */
        .nav-bar {
            display: flex;
            justify-content: center;
            padding: 5px 0;
            width: 100%;
        }

        .nav-bar img {
            height: 40px;
        }

        .status-bar img {
            height: 35px;
        }

        /* Střed s Judy - musí být pod headerem */
        .game-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 80px; /* Místo pro lišty nahoře */
            margin-bottom: 100px; /* Místo pro lišty dole */
        }

        .judy-image {
            height: 90%; 
            object-fit: contain;
        }

        /* Spodní lišta - Nástroje a Obchod */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 15px;
            z-index: 10;
        }

        .tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: 14px;
        }

        .tool img {
            height: 65px;
            margin-bottom: 2px;
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="status-bar">
            <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" alt="Coiny">
            <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" alt="Stats">
            <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" alt="Level">
        </div>
        <div class="nav-bar">
            <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" alt="Koupelna">
        </div>
    </div>

    <div class="game-area">
        <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" alt="Judy" class="judy-image">
    </div>

    <div class="footer">
        <div class="tool">
            <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
            <span>Sprcha</span>
        </div>

        <div class="tool">
            <div style="height: 65px;"></div>
            <span>Mýdlo</span>
        </div>

        <div class="tool">
            <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
            <span>Obchod</span>
        </div>
    </div>

</body>
</html>
