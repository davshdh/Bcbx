<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pou Koupelna Judy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #00d2e5; /* Ta jasně modrá z tvého obrázku */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            align-items: center;
        }

        /* Horní sekce s ikonami */
        .header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 5px;
        }

        .stats-row {
            width: 95%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-row {
            width: 95%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        /* Postava uprostřed */
        .game-main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .judy {
            height: 350px; /* Velikost postavy */
        }

        /* Spodní tmavší lišta */
        .footer {
            width: 100%;
            background-color: #008a99; /* Tmavší modro-zelená dole */
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0;
            border-top: 3px solid rgba(0,0,0,0.1);
        }

        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        .footer-item img {
            height: 70px;
            margin-bottom: 5px;
        }

        /* Velikosti ikon v liště */
        .icon-small { height: 45px; }
        .icon-wide { height: 35px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats-row">
            <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" class="icon-small" alt="Coiny">
            <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="icon-wide" alt="Statistiky">
            <img src="https://i.ibb.co/3mq1t2RW/20260515-194952963.png" class="icon-small" alt="Level">
        </div>

        <div class="nav-row">
            <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" style="height: 40px; opacity: 0.5;" alt="Focení"> <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" style="height: 45px;" alt="Koupelna lišta">
            <div style="width: 40px;"></div> </div>
    </div>

    <div class="game-main">
        <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" class="judy" alt="Judy Hoops">
    </div>

    <div class="footer">
        <div class="footer-item">
            <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
            <span>Sprcha</span>
        </div>
        <div class="footer-item">
            <img src="https://i.ibb.co/5gp47LNG/20260515-192907388.png" alt="Mýdlo">
            <span>Mýdlo</span>
        </div>
        <div class="footer-item">
            <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
            <span>Obchod</span>
        </div>
    </div>

</body>
</html>
