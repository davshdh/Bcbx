<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pou Koupelna - Judy</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #00d2e5; /* Světle modré pozadí koupelny */
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HORNÍ LIŠTA: Energie, Mince, Level */
        .top-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            width: 100%;
        }

        .icon-coin { height: 50px; }
        .icon-bars { height: 35px; }
        .icon-level { height: 50px; }

        /* LIŠTA S NÁZVEM MÍSTNOSTI */
        .nav-bar {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 2px;
        }

        .nav-img { height: 55px; }

        /* POSTAVA JUDY HOOPS */
        .game-middle {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .character-judy {
            height: 60vh; /* Velikost Judy */
            object-fit: contain;
        }

        /* SPODNÍ POLICE S PŘEDMĚTY */
        .bottom-shelf {
            background-color: #00899b; /* Tmavě modrá spodní část */
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0 20px 0;
            border-top: 4px solid rgba(0,0,0,0.1);
        }

        .item-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 33%;
        }

        .item-box img {
            height: 75px;
            margin-bottom: 3px;
        }

        /* STYL TEXTU JAKO V POUOVI */
        .label {
            color: white;
            font-size: 20px;
            font-weight: 900;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 3px  3px 1px #000;
        }
    </style>
</head>
<body>

    <div class="top-stats">
        <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" class="icon-coin" alt="Coiny">
        <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="icon-bars" alt="Bary">
        <img src="https://i.ibb.co/3mq1t2RW/20260515-194952963.png" class="icon-level" alt="Level">
    </div>

    <div class="nav-bar">
        <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" class="nav-img" alt="Koupelna">
    </div>

    <div class="game-middle">
        <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" class="character-judy" alt="Judy Hoops">
    </div>

    <div class="bottom-shelf">
        <div class="item-box">
            <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
            <div class="label">Sprcha</div>
        </div>
        <div class="item-box">
            <img src="https://i.ibb.co/5gp47LNG/20260515-192907388.png" alt="Mýdlo">
            <div class="label">Mýdlo</div>
        </div>
        <div class="item-box">
            <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
            <div class="label">Obchod</div>
        </div>
    </div>

</body>
</html>
