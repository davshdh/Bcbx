<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pou Koupelna FIX</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .game-container {
            width: 360px;
            height: 640px;
            background-color: #00d2ff;
            border: 4px solid #000;
            display: flex;
            flex-direction: column; /* Řadí prvky pod sebe jako patra */
            position: relative;
            overflow: hidden;
        }

        /* 1. PATRO: Statistiky a Levely */
        .header-top {
            background-color: #b3f0ff;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        /* 2. PATRO: Navigace (Koupelna) */
        .header-nav {
            background-color: rgba(255, 255, 255, 0.5);
            height: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        /* STŘED: Judy */
        .main-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Judy stojí na podlaze */
            padding-bottom: 0;
        }

        .main-area img {
            width: 250px; /* Zmenšeno, aby nepřekrývala menu */
            margin-bottom: -10px; 
        }

        /* 3. PATRO: Podlaha a Menu */
        .floor-menu {
            background-color: #00add8;
            height: 110px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 2px solid rgba(0,0,0,0.1);
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
        }

        .item img {
            height: 60px;
            margin-bottom: 5px;
        }

        /* Velikosti ikonek */
        .img-coin { height: 40px; }
        .img-stats { height: 35px; }
        .img-level { height: 45px; }
        .img-room { height: 35px; }

    </style>
</head>
<body>

    <div class="game-container">
        <div class="header-top">
            <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" class="img-coin">
            <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="img-stats">
            <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" class="img-level">
        </div>

        <div class="header-nav">
            <span style="font-size: 20px;">📷</span>
            <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" class="img-room">
            <span style="font-size: 20px;">❓</span>
        </div>

        <div class="main-area">
            <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" alt="Judy">
        </div>

        <div class="floor-menu">
            <div class="item">
                <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png">
                <span>Sprcha</span>
            </div>
            <div class="item">
                <div style="height: 60px; width: 60px; background: rgba(0,0,0,0.1); border-radius: 10px;"></div>
                <span>Mýdlo</span>
            </div>
            <div class="item">
                <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png">
                <span>Obchod</span>
            </div>
        </div>
    </div>

</body>
</html>
