<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pou Koupelna - Finální Verze</title>
    <style>
        body {
            margin: 0;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .game-container {
            width: 360px;
            height: 640px;
            background-color: #00d2ff; /* Barva stěny v koupelně */
            position: relative;
            display: flex;
            flex-direction: column;
            border: 2px solid black;
        }

        /* Horní sekce s ikonkami a levely */
        .header {
            background-color: #b3f0ff; /* Světlejší modrá nahoře */
            padding: 5px 10px;
            z-index: 10;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        /* Navigační lišta s názvem místnosti */
        .nav-bar {
            background-color: rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            z-index: 10;
        }

        /* Postava Judy */
        .character-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .character-area img {
            width: 260px;
            z-index: 5;
        }

        /* Spodní lišta - Podlaha */
        .floor-menu {
            background-color: #00add8; /* Tmavší modrá podlaha */
            height: 120px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            z-index: 10;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: black;
            font-weight: bold;
            font-size: 14px;
        }

        .menu-item img {
            height: 70px;
            margin-bottom: 2px;
        }

        /* Pomocné styly pro obrázky v lištách */
        .icon-coin { height: 45px; }
        .icon-stats { height: 40px; }
        .icon-level { height: 45px; }
        .icon-nav { height: 35px; }

    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="top-row">
                <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" class="icon-coin" alt="Coins">
                <div class="stats-row">
                    <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="icon-stats" alt="Stats">
                </div>
                <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" class="icon-level" alt="Level">
            </div>
        </div>

        <div class="nav-bar">
            <span style="font-size: 24px;">📷</span>
            <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" class="icon-nav" alt="Koupelna">
            <span style="font-size: 24px;">❓</span>
        </div>

        <div class="character-area">
            <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" alt="Judy">
        </div>

        <div class="floor-menu">
            <div class="menu-item">
                <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
                <span>Sprcha</span>
            </div>
            <div class="menu-item">
                <div style="width: 70px; height: 70px; background: rgba(0,0,0,0.1); border-radius: 15px; margin-bottom: 2px;"></div>
                <span>Mýdlo</span>
            </div>
            <div class="menu-item">
                <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
                <span>Obchod</span>
            </div>
        </div>
    </div>

</body>
</html>
