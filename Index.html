<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pou Koupelna - Věrná kopie</title>
    <style>
        body {
            margin: 0;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* Hlavní kontejner hry */
        .game-screen {
            width: 360px;
            height: 640px;
            background-color: #00d2ff; /* Světle modré pozadí koupelny */
            position: relative;
            border: 4px solid #000;
            overflow: hidden;
        }

        /* Horní světlá lišta pro staty */
        .top-info-bar {
            background-color: rgba(255, 255, 255, 0.6);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            justify-content: space-between;
        }

        .coins { height: 45px; }
        .stats { height: 40px; }
        .level { height: 45px; }

        /* Lišta s názvem místnosti a šipkami */
        .room-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 10px;
            padding: 0 5px;
        }

        .nav-icon { height: 35px; }
        .room-title { height: 35px; }

        /* Judy Hopps postava */
        .character {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
        }

        /* Spodní tmavší podlaha */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background-color: #0099cc; /* Tmavší modrá na podlaze */
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: black;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px white;
        }

        .bottom-item img {
            height: 65px;
            margin-bottom: 5px;
        }

    </style>
</head>
<body>

    <div class="game-screen">
        
        <div class="top-info-bar">
            <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" class="coins" alt="Coiny">
            <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="stats" alt="Staty">
            <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" class="level" alt="Level">
        </div>

        <div class="room-nav">
            <img src="https://i.ibb.co/6R68r0N/camera-icon.png" class="nav-icon" alt="Foto"> <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" class="room-title" alt="Koupelna">
            <img src="https://i.ibb.co/zVv7T6f/help-icon.png" class="nav-icon" alt="Help"> </div>

        <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" class="character" alt="Judy">

        <div class="floor">
            <div class="bottom-item">
                <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
                <span>Sprcha</span>
            </div>
            <div class="bottom-item">
                <div style="width: 65px; height: 65px;"></div>
                <span>Mýdlo</span>
            </div>
            <div class="bottom-item">
                <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
                <span>Obchod</span>
            </div>
        </div>

    </div>

</body>
</html>
