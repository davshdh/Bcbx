<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pou Koupelna - Judy Hoops</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #00d2e5; /* Světle modrá barva koupelny */
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HORNÍ LIŠTA: Coiny, Statistiky, Levely */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            width: 100%;
        }

        .coin-img { height: 50px; }
        .stats-img { height: 35px; }
        .level-img { height: 50px; }

        /* LIŠTA S NÁZVEM: Koupelna */
        .room-nav {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 2px;
        }

        .room-bar-img {
            height: 55px;
        }

        /* STŘEDNÍ ČÁST: Judy Hoops */
        .game-main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 10px;
        }

        .judy-img {
            height: 65vh; /* Velikost postavy */
            object-fit: contain;
        }

        /* SPODNÍ PANEL: Police s předměty */
        .footer-shelf {
            background-color: #00899b; /* Tmavě modrá barva police */
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0 25px 0;
            border-top: 4px solid #007685;
        }

        .shelf-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 33%;
        }

        .shelf-item img {
            height: 85px; /* Velikost ikon mýdla a sprchy */
            margin-bottom: 5px;
        }

        /* STYL TEXTU: Bílý s tlustým černým obrysem */
        .item-label {
            color: white;
            font-size: 20px;
            font-weight: 900;
            text-transform: capitalize;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 3px 3px 2px #000;
        }

    </style>
</head>
<body>

    <div class="header-top">
        <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" class="coin-img" alt="Coiny">
        <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" class="stats-img" alt="Bary">
        <img src="https://i.ibb.co/3mq1t2RW/20260515-194952963.png" class="level-img" alt="Level">
    </div>

    <div class="room-nav">
        <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" class="room-bar-img" alt="Koupelna">
    </div>

    <div class="game-main">
        <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" class="judy-img" alt="Judy Hoops">
    </div>

    <div class="footer-shelf">
        <div class="shelf-item">
            <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
            <div class="item-label">Sprcha</div>
        </div>
        <div class="shelf-item">
            <img src="https://i.ibb.co/5gp47LNG/20260515-192907388.png" alt="Mýdlo">
            <div class="item-label">Mýdlo</div>
        </div>
        <div class="shelf-item">
            <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
            <div class="item-label">Obchod</div>
        </div>
    </div>

</body>
</html>
