<!DOCTYPE html>
<html lang="cs">
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #51C6FB; /* Světle modré pozadí jako ve hře */
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Horní lišta s ikonami stavu */
  .top-bar {
    background-color: rgba(255, 255, 255, 0.7);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    height: 60px;
  }

  .stats-icons {
    display: flex;
    gap: 5px;
  }

  .stats-icons img {
    height: 45px;
  }

  .coin-box img, .level-box img {
    height: 50px;
  }

  /* Navigační lišta s nápisem Koupelna */
  .nav-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 10px;
  }

  .nav-bar img {
    height: 50px;
  }

  /* Hlavní prostor pro Judy */
  .game-scene {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .judy {
    height: 70%; /* Velikost Judy na ploše */
  }

  /* Spodní lišta s nástroji */
  .bottom-bar {
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    padding-bottom: 20px;
    height: 120px;
  }

  .tool-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: black;
    font-weight: bold;
    font-size: 20px;
  }

  .tool-item img {
    height: 70px;
    margin-bottom: 5px;
  }
</style>
</head>
<body>

  <div class="top-bar">
    <div class="coin-box">
      <img src="https://i.ibb.co/PzN3DvcK/20260515-194812557.png" alt="Coiny">
    </div>
    
    <div class="stats-icons">
      <img src="https://i.ibb.co/5W5Pt3yJ/image-3.jpg" alt="Status bary">
    </div>

    <div class="level-box">
      <img src="https://i.ibb.co/3YCdK3Sm/20260515-223551410.png" alt="Level">
    </div>
  </div>

  <div class="nav-bar">
    <img src="https://i.ibb.co/ksjYDqyW/20260515-191953594.png" alt="Koupelna lišta">
  </div>

  <div class="game-scene">
    <img src="https://i.ibb.co/B2PZvHtB/20260515-185922931.png" alt="Judy Hoops" class="judy">
  </div>

  <div class="bottom-bar">
    <div class="tool-item">
      <img src="https://i.ibb.co/rJ9ZHV2/20260515-193346823.png" alt="Sprcha">
      <span>Sprcha</span>
    </div>

    <div class="tool-item">
       <div style="height: 70px; width: 70px;"></div> 
       <span>Mýdlo</span>
    </div>

    <div class="tool-item">
      <img src="https://i.ibb.co/fhwWK9J/20260515-193534046.png" alt="Obchod">
      <span>Obchod</span>
    </div>
  </div>

</body>
</html>
